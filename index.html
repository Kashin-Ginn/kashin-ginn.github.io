<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kashin Ginn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0b0c10;
      --surface:  #13151a;
      --border:   #1f2330;
      --ink:      #e8eaf0;
      --muted:    #6b7185;
      --accent:   #7c6aff;
      --accent2:  #00e5b0;
      --mono:     'Space Mono', monospace;
      --sans:     'Space Grotesk', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      overflow: hidden;
    }

    /* Pixel grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.35;
      pointer-events: none;
    }

    .stage {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      position: relative;
    }

    /* Glow orb */
    .orb {
      position: absolute;
      width: 480px;
      height: 480px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,106,255,0.18) 0%, transparent 70%);
      pointer-events: none;
      animation: pulse 4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%       { transform: scale(1.08); opacity: 0.7; }
    }

    .tag {
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      color: var(--accent2);
      text-transform: uppercase;
      margin-bottom: 1.2rem;
      opacity: 0;
      animation: fadeUp 0.6s 0.2s forwards;
    }

    h1 {
      font-size: clamp(2.8rem, 8vw, 5.5rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.03em;
      opacity: 0;
      animation: fadeUp 0.6s 0.35s forwards;
    }

    h1 span {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .sub {
      margin-top: 1rem;
      font-size: clamp(0.95rem, 2vw, 1.1rem);
      color: var(--muted);
      max-width: 34ch;
      line-height: 1.6;
      opacity: 0;
      animation: fadeUp 0.6s 0.5s forwards;
    }

    .cta {
      margin-top: 2.8rem;
      opacity: 0;
      animation: fadeUp 0.6s 0.65s forwards;
    }

    .cta a {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.85rem 2rem;
      border-radius: 6px;
      background: var(--accent);
      color: #fff;
      font-family: var(--mono);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 0 0 0 rgba(124,106,255,0);
    }
    .cta a:hover {
      background: #9585ff;
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(124,106,255,0.35);
    }
    .cta a svg { width: 16px; height: 16px; fill: currentColor; }

    .links {
      margin-top: 2rem;
      display: flex;
      gap: 1.4rem;
      justify-content: center;
      opacity: 0;
      animation: fadeUp 0.6s 0.8s forwards;
    }
    .links a {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .links a:hover { color: var(--accent2); }

    .corner {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--border);
      letter-spacing: 0.1em;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .orb { width: 280px; height: 280px; }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="orb"></div>

    <p class="tag">Game Dev &amp; Addon Creator</p>

    <h1>Kashin<br><span>Ginn</span></h1>

    <p class="sub">Building puzzle games and Construct 3 tools, one block at a time.</p>

    <div class="cta">
      <a href="https://kashin-ginn.github.io/my-creations/">
        <svg viewBox="0 0 16 16"><path d="M2 3h12v2H2zm0 4h8v2H2zm0 4h10v2H2z"/></svg>
        View my creations
      </a>
    </div>

    <div class="links">
      <a href="https://www.youtube.com/@KashinGinn" target="_blank" rel="noopener">YouTube</a>
      <a href="https://ko-fi.com/kashinginn" target="_blank" rel="noopener">Ko-fi</a>
    </div>
  </div>

  <p class="corner">kashin-ginn.github.io</p>
</body>
</html>
